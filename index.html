<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nifty Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/lightweight-charts.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0d0c;--bg2:#141716;--bg3:#1c1f1d;--bg4:#252928;
  --txt:#e8ede9;--txt2:#8a9b8d;--txt3:#4d5c50;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --green:#4ade80;--green-dim:#162a1e;
  --red:#f87171;--red-dim:#2a1212;
  --amber:#fbbf24;--amber-dim:#2a1f08;
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,.1);--accent:#3dffa0;
  --r:8px;--rl:14px;
}
html,body{height:100%;background:#000;}
body{font-family:'Sora',sans-serif;display:flex;justify-content:center;}
/* Mobile: single column, centred, max 430px */
.app{width:100%;max-width:430px;min-height:100dvh;background:var(--bg);}
.pb{padding-bottom:72px;}
/* Sidebar hidden on mobile */
.sidebar{display:none;}
/* main-area fills the app shell on mobile */
.main-area{width:100%;}

/* ── Desktop layout (≥ 768px) ──────────────────────────── */
@media(min-width:768px){
  body{justify-content:flex-start;align-items:flex-start;}
  /* App becomes a full-width flex row */
  .app{display:flex;flex-direction:row;max-width:100%;width:100%;min-height:100dvh;}
  .pb{padding-bottom:24px;}
  /* Hide mobile chrome */
  .topbar{display:none;}
  .bottom-nav{display:none;}
  /* Sidebar */
  .sidebar{display:flex;flex-direction:column;width:220px;min-width:220px;height:100dvh;position:sticky;top:0;border-right:0.5px solid var(--border);overflow-y:auto;background:var(--bg);flex-shrink:0;}
  .sb-brand{padding:22px 18px 18px;border-bottom:0.5px solid var(--border);}
  .sb-pill{display:flex;align-items:center;gap:8px;padding:11px 18px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .15s;}
  .sb-pill:hover{background:var(--bg2);}
  .sb-pill .status-txt{font-size:11px;color:var(--txt2);}
  .sb-nav{display:flex;flex-direction:column;padding:8px 10px;flex:1;}
  .sb-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--r);border:none;background:transparent;color:var(--txt3);font-size:13px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;width:100%;text-align:left;transition:all .15s;-webkit-tap-highlight-color:transparent;}
  .sb-btn:hover{background:var(--bg2);color:var(--txt);}
  .sb-btn.active{background:rgba(61,255,160,.07);color:var(--accent);}
  .sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
  .sb-regime{padding:14px 18px;border-top:0.5px solid var(--border);margin-top:auto;}
  /* Main area fills remaining width */
  .main-area{flex:1;min-width:0;display:flex;flex-direction:column;overflow-x:hidden;}
  /* Stock card grid */
  .sig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:0.5px;background:var(--border);}
  .sig-card{background:var(--bg);}
  /* Filter / Setup 2-col grid */
  .setup-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:24px;align-items:start;}
  .setup-card{margin-bottom:0;}
  .setup-full{grid-column:1 / -1;}
  /* Detail view 2-col */
  .detail-cols{display:grid;grid-template-columns:1fr 1fr;gap:0.5px;background:var(--border);align-items:start;}
  .detail-col{background:var(--bg);}
}
@media(min-width:1100px){
  .sidebar{width:240px;min-width:240px;}
  .sig-grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}
}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 13px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:30;}
.brand-name{font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.3px;}
.brand-sub{font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace;margin-top:2px;}
.status-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);cursor:pointer;}
.dot{width:7px;height:7px;border-radius:50%;}
.status-txt{font-size:11px;color:var(--txt2);font-family:'DM Mono',monospace;}
.regime-bar{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:0.5px solid var(--border);}
.regime-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.regime-txt{font-size:11px;font-weight:600;}
.regime-nifty{font-size:10px;color:var(--txt3);margin-left:auto;font-family:'DM Mono',monospace;}
.sector-strip{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--border);scrollbar-width:none;padding:0 6px;}
.sector-strip::-webkit-scrollbar{display:none;}
.sec-tab{flex-shrink:0;padding:11px 13px;font-size:12px;font-weight:500;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.sec-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.scan-bar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid var(--border);}
.scan-info{flex:1;font-size:12px;color:var(--txt2);}
.scan-info b{color:var(--txt);font-weight:600;}
.scan-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--accent);color:#050f08;font-size:12px;font-weight:700;border:none;border-radius:20px;cursor:pointer;font-family:'Sora',sans-serif;white-space:nowrap;}
.scan-btn:active{opacity:.75;}
.scan-btn:disabled{opacity:.35;cursor:not-allowed;}
.counts-bar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:var(--border);gap:0.5px;border-bottom:0.5px solid var(--border);}
.count-cell{background:var(--bg);padding:11px 6px;text-align:center;}
.count-num{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.5px;}
.count-lbl{font-size:9px;color:var(--txt3);margin-top:1px;text-transform:uppercase;letter-spacing:.07em;}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px 5px;}
.list-label{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;}
.manage-link{font-size:12px;color:var(--blue);cursor:pointer;}
.group-label{font-size:10px;font-weight:600;padding:12px 16px 5px;text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px;}
.group-label::after{content:'';flex:1;height:0.5px;background:var(--border);}
.sig-card{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s;}
.sig-card:active{background:var(--bg2);}
.score-badge{width:48px;height:48px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.score-num{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}
.score-tag{font-size:8px;font-weight:700;opacity:.75;margin-top:1px;letter-spacing:.04em;}
.sig-meta{flex:1;min-width:0;}
.sig-sym{font-size:14px;font-weight:600;color:var(--txt);font-family:'DM Mono',monospace;}
.sig-sub{font-size:9px;font-family:'DM Mono',monospace;color:var(--txt3);margin-top:2px;}
.sig-pips{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.pip{padding:2px 5px;border-radius:3px;font-size:9px;font-weight:600;font-family:'DM Mono',monospace;}
.pip.pass{background:var(--green-dim);color:var(--green);}
.pip.fail{background:var(--bg4);color:var(--txt3);}
.sig-right{text-align:right;flex-shrink:0;}
.sig-price{font-size:14px;font-weight:600;color:var(--txt);font-family:'DM Mono',monospace;}
.sig-chg{font-size:11px;margin-top:3px;font-family:'DM Mono',monospace;}
.sig-vol{font-size:9px;color:var(--txt3);margin-top:3px;font-family:'DM Mono',monospace;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.back-row{display:flex;align-items:center;gap:5px;padding:14px 16px 8px;cursor:pointer;color:var(--txt2);font-size:13px;}
.d-hero{padding:4px 16px 18px;border-bottom:0.5px solid var(--border);}
.d-sym{font-size:26px;font-weight:700;color:var(--txt);font-family:'DM Mono',monospace;letter-spacing:-.5px;}
.d-sector-lbl{font-size:11px;color:var(--txt3);margin-top:3px;}
.d-price{font-size:32px;font-weight:700;color:var(--txt);margin-top:12px;font-family:'DM Mono',monospace;letter-spacing:-1px;}
.d-chg{font-size:13px;margin-top:4px;font-family:'DM Mono',monospace;}
.verdict{display:inline-flex;align-items:center;gap:7px;margin-top:12px;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;}
.verdict.buy{background:var(--green-dim);color:var(--green);}
.verdict.sell{background:var(--red-dim);color:var(--red);}
.verdict.watch{background:var(--amber-dim);color:var(--amber);}
.cond-box{margin:14px 16px 0;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border);overflow:hidden;}
.cond-box-title{font-size:10px;font-weight:600;color:var(--txt3);padding:11px 14px 9px;text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;border-bottom:0.5px solid var(--border);}
.cond-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border);gap:10px;}
.cond-row:last-child{border-bottom:none;}
.cond-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.cond-check{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.cond-check.pass{background:var(--green-dim);color:var(--green);}
.cond-check.fail{background:var(--red-dim);color:var(--red);}
.cond-name{font-size:11px;color:var(--txt);line-height:1.35;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5px;background:var(--border);}
.metric-cell{background:var(--bg);padding:10px 12px;}
.metric-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;}
.metric-val{font-size:14px;font-weight:600;color:var(--txt);font-family:'DM Mono',monospace;margin-top:2px;}
.sl-note{margin:12px 16px 0;background:var(--amber-dim);border:0.5px solid rgba(251,191,36,.15);border-radius:var(--r);padding:11px 14px;font-size:12px;color:var(--amber);line-height:1.6;}
.bt-btn{margin:16px 16px 0;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;width:calc(100% - 32px);justify-content:center;}
.bt-btn:hover{background:var(--bg3);}
.bt-section{margin:16px 16px 0;border-radius:var(--rl);border:0.5px solid var(--border);overflow:hidden;background:var(--bg2);}
.bt-header{padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.bt-title{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;}
.bt-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5px;background:var(--border);}
.bt-stat{background:var(--bg2);padding:10px 12px;}
.bt-stat-label{font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace;margin-bottom:3px;}
.bt-stat-val{font-size:15px;font-weight:700;color:var(--txt);}
.bt-trade{display:grid;grid-template-columns:1fr 1fr auto;gap:2px;padding:9px 14px;border-bottom:0.5px solid var(--border);font-size:11px;font-family:'DM Mono',monospace;}
.bt-trade:last-child{border-bottom:none;}
.bt-win{color:#4ade80;}
.bt-loss{color:#f87171;}
.bt-open{color:var(--accent);}
/* ── Day Trading ── */
.dtc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.dtc-top{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 12px;border-bottom:0.5px solid var(--border);}
.dtc-sym{font-size:15px;font-weight:800;color:var(--txt);}
.dtc-sub{font-size:10px;color:var(--txt3);margin-top:2px;}
.dtc-gap{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;font-family:'DM Mono',monospace;}
.gap-up{background:rgba(74,222,128,.14);color:#4ade80;}
.gap-dn{background:rgba(248,113,113,.14);color:#f87171;}
.gap-flat{background:var(--bg3);color:var(--txt3);}
.dtc-ltp-row{display:flex;align-items:baseline;gap:7px;padding:9px 12px 5px;}
.dtc-ltp{font-size:19px;font-weight:800;color:var(--txt);}
.dtc-chg{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;}
.dtc-levels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5px;background:var(--border);}
.dtc-lv{background:var(--bg2);padding:7px 10px;}
.dtc-lv-lbl{font-size:9px;color:var(--txt3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.dtc-lv-val{font-size:12px;font-weight:700;color:var(--txt2);font-family:'DM Mono',monospace;margin-top:2px;}
.dtc-setup{padding:8px 12px;font-size:11px;color:var(--txt3);line-height:1.7;}
.dtc-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.dtc-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;font-family:'DM Mono',monospace;}
.pill-entry{background:rgba(96,165,250,.14);color:#60a5fa;}
.pill-stop{background:rgba(248,113,113,.14);color:#f87171;}
.pill-tgt{background:rgba(74,222,128,.14);color:#4ade80;}
.dt-pulse{margin:12px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.dt-pulse-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px;}
.dt-pulse-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;}
.dt-pulse-val{font-size:14px;font-weight:800;margin-top:2px;}
.dt-filter-strip{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;}
.dp-header{padding:16px 16px 0;display:flex;align-items:flex-start;gap:12px;}
.dp-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;width:52px;height:52px;border-radius:12px;flex-shrink:0;}
.dp-score{font-size:20px;font-weight:800;line-height:1;}
.dp-cls{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.dp-info{flex:1;min-width:0;}
.dp-sym{font-size:20px;font-weight:800;color:var(--txt);letter-spacing:-.02em;}
.dp-price{font-size:15px;font-weight:600;color:var(--txt);margin-top:1px;}
.dp-meta{font-size:11px;color:var(--txt3);margin-top:3px;font-family:'DM Mono',monospace;}
.dt-tabs{display:flex;border-bottom:0.5px solid var(--border);margin-top:14px;background:var(--bg);}
.dt-tab{flex:1;padding:10px 4px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--txt3);border-bottom:2px solid transparent;}
.dt-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.bt-eq-wrap{margin:0;background:var(--bg2);border-bottom:0.5px solid var(--border);}
.bt-period{padding:6px 14px 8px;font-size:10px;color:var(--txt3);font-family:'DM Mono',monospace;}
.bt-empty{padding:40px 24px;text-align:center;color:var(--txt3);font-size:13px;}
.src-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace;}
.src-badge.kite{background:rgba(96,165,250,.12);color:#60a5fa;}
.src-badge.angel{background:rgba(245,158,11,.12);color:#f59e0b;}
.src-badge.yahoo{background:rgba(167,139,250,.12);color:#a78bfa;}
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80dvh;padding:32px 24px;text-align:center;gap:12px;}
.splash-title{font-size:18px;font-weight:700;color:var(--txt);}
.splash-sub{font-size:13px;color:var(--txt3);line-height:1.7;}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:18px 16px 36px;border-top:0.5px solid var(--border2);max-height:80dvh;overflow-y:auto;}
.modal-handle{width:36px;height:3px;background:var(--bg4);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:14px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.chip{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:20px;font-size:12px;color:var(--txt);font-family:'DM Mono',monospace;}
.chip-x{color:var(--txt3);cursor:pointer;font-size:15px;line-height:1;}
.chip-x:hover{color:var(--red);}
.add-row{display:flex;gap:8px;}
.add-input{flex:1;background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:9px 12px;font-size:13px;color:var(--txt);font-family:'DM Mono',monospace;text-transform:uppercase;outline:none;}
.add-input:focus{border-color:var(--accent);}
.add-btn{padding:9px 16px;background:var(--accent);color:#050f08;font-size:13px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;font-family:'Sora',sans-serif;}
.modal-close{width:100%;padding:11px;background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--r);color:var(--txt2);font-size:14px;cursor:pointer;margin-top:14px;font-family:'Sora',sans-serif;}
.setup-wrap{padding:16px;}
.setup-card{background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border);padding:18px;margin-bottom:14px;}
.setup-card h3{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:14px;}
.full-btn{width:100%;padding:12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg3);color:var(--txt);font-size:14px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;margin-bottom:8px;display:block;text-align:center;}
.full-btn.primary{background:var(--accent);color:#050f08;border-color:transparent;}
.full-btn:active{opacity:.75;}
.field-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field-label{font-size:11px;color:var(--txt3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.field-input{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--txt);font-family:'DM Mono',monospace;outline:none;width:100%;}
.field-input:focus{border-color:var(--accent);}
.field-input[type=password]{letter-spacing:.15em;}
.chain-row{display:flex;align-items:center;gap:6px;padding:12px 0;border-bottom:0.5px solid var(--border);}
.chain-row:last-child{border-bottom:none;}
.chain-num{width:20px;height:20px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txt3);flex-shrink:0;font-family:'DM Mono',monospace;}
.chain-info{flex:1;}
.chain-name{font-size:13px;font-weight:600;color:var(--txt);}
.chain-desc{font-size:11px;color:var(--txt3);margin-top:2px;}
.chain-status{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:10px;}
.chain-status.ok{background:var(--green-dim);color:var(--green);}
.chain-status.warn{background:var(--amber-dim);color:var(--amber);}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:14px;}
.spinner{width:24px;height:24px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;}
.spinner.sm{width:13px;height:13px;border-width:2px;margin:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:12px;color:var(--txt3);}
.empty{text-align:center;padding:56px 20px;color:var(--txt3);font-size:13px;line-height:1.8;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--bg);font-size:13px;font-weight:600;padding:9px 20px;border-radius:24px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:99;}
.toast.show{opacity:1;}

<script>
// ── LightweightCharts chart manager ───────────────────
var _chartData = {};   // keyed by chart id; holds data for initCharts()
var _lwcInst   = [];   // active chart instances; destroyed on each render

function _lwcDestroy() {
  _lwcInst.forEach(function(c){ try{ c.remove(); }catch(e){} });
  _lwcInst = [];
}

function _lwcBaseOpts(el, h) {
  var w = (el && (el.clientWidth || el.offsetWidth)) || 600;
  return {
    width: w,
    height: h,
    layout: {
      background: { type: 'solid', color: '#141716' },
      textColor: 'rgba(232,237,233,0.4)'
    },
    grid: {
      vertLines: { color: 'rgba(255,255,255,0.04)' },
      horzLines: { color: 'rgba(255,255,255,0.04)' }
    },
    crosshair: { mode: 1 },
    rightPriceScale: { borderColor: 'rgba(255,255,255,0.08)' },
    timeScale: { borderColor: 'rgba(255,255,255,0.08)', timeVisible: true, secondsVisible: false },
    handleScroll: true,
    handleScale: true
  };
}

// ── Main daily candlestick chart ───────────────────────
function _lwcMain(el, d) {
  var raw = d.raw, stopLoss = d.stopLoss;
  if (!raw || raw.length < 20 || !window.LightweightCharts) return null;
  var LC = window.LightweightCharts;

  try {
  var opts = _lwcBaseOpts(el, 300);
  opts.rightPriceScale = { borderColor:'rgba(255,255,255,0.08)', scaleMargins:{ top:0.08, bottom:0.28 } };
  var chart = LC.createChart(el, opts);

  // Candles — last 120
  var N = Math.min(120, raw.length), startIdx = raw.length - N;
  var slice = raw.slice(-N);
  var cs = chart.addCandlestickSeries({
    upColor:'#4ade80', downColor:'#f87171',
    borderUpColor:'#4ade80', borderDownColor:'#f87171',
    wickUpColor:'#4ade80', wickDownColor:'#f87171'
  });
  cs.setData(slice.map(function(c){
    // c[0] is ISO string "2024-01-15T00:00:00.000Z" — LWC needs "YYYY-MM-DD"
    var t = typeof c[0]==='string' ? c[0].slice(0,10) : c[0];
    return { time:t, open:+c[1], high:+c[2], low:+c[3], close:+c[4] };
  }).filter(function(c){ return c.open>0; }));

  // Volume histogram
  var vs = chart.addHistogramSeries({ priceFormat:{ type:'volume' }, priceScaleId:'vol', color:'rgba(74,222,128,0.2)' });
  chart.priceScale('vol').applyOptions({ scaleMargins:{ top:0.75, bottom:0 } });
  vs.setData(slice.map(function(c){
    var t = typeof c[0]==='string' ? c[0].slice(0,10) : c[0];
    return { time:t, value:+c[5]||0, color:(+c[4]>=(+c[1]))?'rgba(74,222,128,0.22)':'rgba(248,113,113,0.22)' };
  }).filter(function(c){ return c.value>0; }));

  // SMA50 / SMA200
  var s50=[], s200=[];
  for (var i=0; i<N; i++) {
    var ri = startIdx+i;
    var rt = typeof raw[ri][0]==='string' ? raw[ri][0].slice(0,10) : raw[ri][0];
    if (ri>=49)  { var a=0; for(var j=ri-49;j<=ri;j++)  a+=+raw[j][4]; s50.push({time:rt,value:a/50});  }
    if (ri>=199) { var a=0; for(var j=ri-199;j<=ri;j++) a+=+raw[j][4]; s200.push({time:rt,value:a/200}); }
  }
  if (s50.length) {
    var l50 = chart.addLineSeries({ color:'#60a5fa', lineWidth:1.5, priceLineVisible:false, lastValueVisible:false, title:'SMA50' });
    l50.setData(s50);
  }
  if (s200.length) {
    var l200 = chart.addLineSeries({ color:'#fbbf24', lineWidth:1.5, priceLineVisible:false, lastValueVisible:false, title:'SMA200' });
    l200.setData(s200);
  }

  // Entry line (last close)
  var lastClose = +slice[slice.length-1][4];
  cs.createPriceLine({ price:lastClose, color:'#3dffa0', lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'Entry' });

  // Stop loss line
  var slVal = stopLoss ? parseFloat(stopLoss) : null;
  if (slVal && slVal > 0) {
    cs.createPriceLine({ price:slVal, color:'#f87171', lineWidth:1, lineStyle:2, axisLabelVisible:true, title:'SL' });
  }

  chart.timeScale().fitContent();
  return chart;
  } catch(e) { console.error('[LWC] chart error:', e.message); return null; }
}

// ── Backtest equity curve ──────────────────────────────
function _lwcEquity(el, d) {
  var bt = d.bt;
  if (!bt || bt.eq.length < 2 || !window.LightweightCharts) return null;
  var LC = window.LightweightCharts;

  var chart = LC.createChart(el, _lwcBaseOpts(el, 150));
  var endVal = bt.eq[bt.eq.length-1].v;
  var lineCol = endVal >= 100 ? '#4ade80' : '#f87171';
  var fillTop = endVal >= 100 ? 'rgba(74,222,128,0.18)' : 'rgba(248,113,113,0.14)';
  var fillBot = endVal >= 100 ? 'rgba(74,222,128,0.02)' : 'rgba(248,113,113,0.02)';

  var eqSeries = chart.addAreaSeries({
    lineColor: lineCol, topColor: fillTop, bottomColor: fillBot,
    lineWidth: 1.5, priceLineVisible: false, lastValueVisible: true,
    title: 'Strategy'
  });
  // e.d is ISO string from candle data — LWC needs "YYYY-MM-DD"
  function _toDate(d) { return typeof d==='string' ? d.slice(0,10) : d; }
  eqSeries.setData(bt.eq.map(function(e){ return { time:_toDate(e.d), value:+e.v.toFixed(2) }; }));

  var bhEnd = +(100 + bt.bhRet).toFixed(2);
  var bhSeries = chart.addLineSeries({ color:'rgba(255,255,255,0.22)', lineWidth:1, lineStyle:2, priceLineVisible:false, lastValueVisible:false, title:'B&H' });
  bhSeries.setData([{ time:_toDate(bt.eq[0].d), value:100 }, { time:_toDate(bt.eq[bt.eq.length-1].d), value:bhEnd }]);

  eqSeries.createPriceLine({ price:100, color:'rgba(255,255,255,0.12)', lineWidth:1, lineStyle:0 });
  chart.timeScale().fitContent();
  return chart;
}

// ── ORB intraday mini chart ────────────────────────────
function _lwcOrb(el, d) {
  if (!d || !d.candles || !window.LightweightCharts) return null;
  var LC = window.LightweightCharts;

  var opts = _lwcBaseOpts(el, 100);
  opts.rightPriceScale = { visible:false };
  opts.leftPriceScale  = { visible:false };
  opts.timeScale        = { visible:false };
  opts.crosshair        = { mode:0 };
  opts.handleScroll     = false;
  opts.handleScale      = false;
  opts.grid             = { vertLines:{ visible:false }, horzLines:{ visible:false } };

  var chart = LC.createChart(el, opts);
  var cs = chart.addCandlestickSeries({
    upColor:'#4ade80', downColor:'#f87171',
    borderUpColor:'#4ade80', borderDownColor:'#f87171',
    wickUpColor:'#4ade80', wickDownColor:'#f87171'
  });
  cs.setData(d.candles.map(function(c){ return { time:c.t, open:c.o, high:c.h, low:c.l, close:c.c }; }));
  cs.createPriceLine({ price:d.orbH, color:'#4ade80', lineWidth:1, lineStyle:1, axisLabelVisible:false, title:'ORB H' });
  cs.createPriceLine({ price:d.orbL, color:'#f87171', lineWidth:1, lineStyle:1, axisLabelVisible:false, title:'ORB L' });
  if (d.ltp) cs.createPriceLine({ price:d.ltp, color:'#a78bfa', lineWidth:1.5, lineStyle:2, axisLabelVisible:false, title:'LTP' });
  chart.timeScale().fitContent();
  return chart;
}

// Called after every render() — creates charts in their containers
function initCharts() {
  if (!window.LightweightCharts) return;
  _lwcDestroy();
  var el, c;

  el = document.getElementById('lwc-main');
  if (el && _chartData.main)   { c = _lwcMain(el,   _chartData.main);   if(c) _lwcInst.push(c); }

  el = document.getElementById('lwc-equity');
  if (el && _chartData.equity) { c = _lwcEquity(el, _chartData.equity); if(c) _lwcInst.push(c); }

  document.querySelectorAll('[id^="lwc-orb-"]').forEach(function(orbEl) {
    var sym = orbEl.id.slice(8);
    var od = _chartData['orb-'+sym];
    if (od) { c = _lwcOrb(orbEl, od); if(c) _lwcInst.push(c); }
  });
}

// Resize all charts when window width changes
window.addEventListener('resize', function() {
  _lwcInst.forEach(function(chart) {
    try {
      var el = chart.chartElement ? chart.chartElement().parentElement : null;
      if (el) chart.resize(el.clientWidth, chart.options().height);
    } catch(e) {}
  });
});

// ── State ──────────────────────────────────────────────
var S = {
  tab:'scanner', activeSector:'IT', detail:null, detailTab:'backtest',
  scanning:false, authLoading:true,

  sources: {
    kite:  { connected:false, token:'', userName:'', error:null },
    angel: { connected:false, error:null },
    yahoo: { connected:true,  error:null }
  },

  angelCreds: {
    apiKey: localStorage.getItem('angel_api_key')||'',
    clientId: localStorage.getItem('angel_client_id')||''
  },

  results:{}, modal:false,

  // Analyze tab state
  analyze: { query:'', result:null, loading:false, error:null },

  // Backtest state
  btResult: null, // { symbol, data } once run

  // Day Trading state
  day: { loading: false, quotes: {}, lastRefresh: null, filter: 'all' },

  // Filter tab state
  filter: {
    minScore: 0,
    cls: { elite: true, strong: true, emerging: true, weak: true }
  },

  // Intraday Strategy state
  strategy: {
    loading: false,
    data:    {},    // { SYM: { orbH, orbL, orbSize, ltp, change, candles, volRatio } }
    lastRefresh: null,
    filter: 'all'  // 'all' | 'long' | 'short' | 'inside'
  },

  // Paper Trading state
  paper: {
    capital:    parseFloat(localStorage.getItem('paper_capital') || '500000'),
    cash:       parseFloat(localStorage.getItem('paper_cash')    || '500000'),
    positions:  JSON.parse(localStorage.getItem('paper_positions') || '[]'),
    trades:     JSON.parse(localStorage.getItem('paper_trades')    || '[]'),
    autoTrade:  localStorage.getItem('paper_auto') === '1',
    riskPct:    1,
    maxPos:     5
  }
};

// ── Sectors ────────────────────────────────────────────
var SECTORS = {
  'IT':     {label:'IT / Tech',   icon:'💻', symbols:['TCS','INFY','WIPRO','HCLTECH','TECHM','LTIM','PERSISTENT','MPHASIS','COFORGE','KPITTECH']},
  'BANK':   {label:'Banking',     icon:'🏦', symbols:['HDFCBANK','ICICIBANK','KOTAKBANK','AXISBANK','SBIN','INDUSINDBK','BANDHANBNK','FEDERALBNK','IDFCFIRSTB','AUBANK']},
  'PHARMA': {label:'Pharma',      icon:'💊', symbols:['SUNPHARMA','DRREDDY','CIPLA','DIVISLAB','AUROPHARMA','LUPIN','TORNTPHARM','ALKEM','IPCALAB','ABBOTINDIA']},
  'AUTO':   {label:'Auto / EV',   icon:'🚗', symbols:['MARUTI','TATAMOTORS','M&M','BAJAJ-AUTO','HEROMOTOCO','EICHERMOT','ASHOKLEY','TVSMOTOR','OLECTRA','MOTHERSON']},
  'FMCG':   {label:'FMCG',        icon:'🛒', symbols:['HINDUNILVR','ITC','NESTLEIND','BRITANNIA','DABUR','MARICO','GODREJCP','EMAMILTD','COLPAL','TATACONSUM']},
  'ENERGY': {label:'Energy',      icon:'⚡', symbols:['RELIANCE','ONGC','IOC','BPCL','NTPC','POWERGRID','ADANIGREEN','TATAPOWER','CESC','TORNTPOWER']},
  'INFRA':  {label:'Infra / RE',  icon:'🏗️', symbols:['LT','ADANIPORTS','DLF','GODREJPROP','OBEROIRLTY','PRESTIGE','PHOENIXLTD','BRIGADE','IRFC','GMRINFRA']},
  'ALL':    {label:'All Sectors', icon:'🔭', symbols:[]}
};
SECTORS['ALL'].symbols = [].concat.apply([],
  Object.keys(SECTORS).filter(function(k){return k!=='ALL';})
  .map(function(k){return SECTORS[k].symbols;})
).filter(function(v,i,a){return a.indexOf(v)===i;});

// ── Source helpers ─────────────────────────────────────
function activeSource() {
  if (S.sources.kite.connected)  return 'kite';
  if (S.sources.angel.connected) return 'angel';
  return 'yahoo';
}

// ── Kite auth ──────────────────────────────────────────
function initKite() {
  var saved    = localStorage.getItem('kite_access_token');
  var savedDay = localStorage.getItem('kite_token_date');
  var today    = new Date().toDateString();
  if (saved && savedDay === today) {
    S.sources.kite.connected = true;
    S.sources.kite.token     = saved;
    S.sources.kite.userName  = localStorage.getItem('kite_user_name') || '';
    S.authLoading = false;
    updateConnPill(); render();
    if (S.tab === 'scanner' && !S.scanning) scanAll();
  } else {
    localStorage.removeItem('kite_access_token');
    localStorage.removeItem('kite_token_date');
    fetchKiteToken();
  }
}

function fetchKiteToken() {
  // No server-side /api/auth endpoint — mark Kite disconnected gracefully,
  // then continue with Angel / Yahoo fallback chain (BUG-04 fix)
  S.authLoading = true; render();
  S.sources.kite.connected = false;
  S.sources.kite.error     = 'Manual token required — use Kite Connect login';
  initAngel().then(function(){
    S.authLoading = false;
    updateConnPill(); render();
    if (S.tab === 'scanner' && !S.scanning) scanAll();
  });
}

function initAngel() {
  if (!S.angelCreds.apiKey) { S.sources.angel.connected = false; return Promise.resolve(); }
  return fetch('/api/angel?action=auth')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.ok) { S.sources.angel.connected = true; S.sources.angel.error = null; }
      else throw new Error(data.error || 'Angel auth failed');
    })
    .catch(function(err){ S.sources.angel.connected = false; S.sources.angel.error = err.message; });
}

// ── Kite API (direct, for fallback) ───────────────────
var tokenCache = {};

function kiteGet(path) {
  return fetch('/api/kite' + path, {
    headers: { 'X-Access-Token': S.sources.kite.token }
  }).then(function(r){
    if (!r.ok) return r.json().then(function(e){ throw new Error(e.message||r.status); });
    return r.json();
  });
}

function getInstrumentTokens(syms) {
  var needed = syms.filter(function(s){return !tokenCache[s];});
  if (!needed.length) return Promise.resolve();
  return kiteGet('/instruments/NSE').then(function(json){
    var list = json.data || [];
    list.forEach(function(inst){
      if (inst.segment==='NSE' && inst.instrument_type==='EQ')
        tokenCache[inst.tradingsymbol] = inst.instrument_token;
    });
  }).catch(function(e){ console.warn('instruments fetch error:', e.message); });
}

function kiteHistory(sym) {
  var token = tokenCache[sym];
  if (!token) throw new Error('no token for ' + sym);
  var range = getDateRange();
  return kiteGet('/instruments/historical/'+token+'/day?from='+range.from+'&to='+range.to+'&continuous=0')
    .then(function(json){
      var candles = json.data && json.data.candles ? json.data.candles : [];
      if (!candles.length) throw new Error('empty kite candles');
      return candles;
    });
}

// ── Indicators ─────────────────────────────────────────
function sma(arr, n) {
  var s = arr.slice(-n);
  return s.length < n ? null : s.reduce(function(a,b){return a+b;},0)/n;
}

function calcRSI(closes) {
  // Wilder's smoothed RSI(14) using all available data
  var n = 14;
  if (closes.length < n + 1) return null;
  // Seed with simple average over first n periods
  var g = 0, l = 0;
  for (var i = 1; i <= n; i++) {
    var d = closes[i] - closes[i - 1];
    if (d > 0) g += d; else l -= d;
  }
  var ag = g / n, al = l / n;
  // Wilder smoothing over remaining candles
  for (var i = n + 1; i < closes.length; i++) {
    var d = closes[i] - closes[i - 1];
    var gain = d > 0 ? d : 0;
    var loss = d < 0 ? -d : 0;
    ag = (ag * (n - 1) + gain) / n;
    al = (al * (n - 1) + loss) / n;
  }
  return al === 0 ? 100 : 100 - (100 / (1 + ag / al));
}

function calcATR(highs, lows, closes, n) {
  n = n || 14;
  if (highs.length < n+1) return null;
  var trs = [];
  for (var i=1;i<highs.length;i++)
    trs.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
  var atr = trs.slice(0,n).reduce(function(a,b){return a+b;},0)/n;
  for (var i=n;i<trs.length;i++) atr=(atr*(n-1)+trs[i])/n;
  return atr;
}

function calcADX(highs, lows, closes, n) {
  n = n || 14;
  if (highs.length < n*2+1) return null;
  var trs=[], pDMs=[], mDMs=[];
  for (var i=1;i<highs.length;i++){
    var h=highs[i],l=lows[i],pc=closes[i-1],ph=highs[i-1],pl=lows[i-1];
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
    var up=h-ph, dn=pl-l;
    pDMs.push(up>dn&&up>0?up:0);
    mDMs.push(dn>up&&dn>0?dn:0);
  }
  var sTR=trs.slice(0,n).reduce(function(a,b){return a+b;},0);
  var sPDM=pDMs.slice(0,n).reduce(function(a,b){return a+b;},0);
  var sMDM=mDMs.slice(0,n).reduce(function(a,b){return a+b;},0);
  var dxArr=[];
  for (var i=n;i<trs.length;i++){
    sTR=sTR-sTR/n+trs[i]; sPDM=sPDM-sPDM/n+pDMs[i]; sMDM=sMDM-sMDM/n+mDMs[i];
    var pDI=sTR>0?100*sPDM/sTR:0, mDI=sTR>0?100*sMDM/sTR:0;
    var s=pDI+mDI; dxArr.push(s>0?100*Math.abs(pDI-mDI)/s:0);
  }
  if (dxArr.length<n) return null;
  var adx=dxArr.slice(0,n).reduce(function(a,b){return a+b;},0)/n;
  for (var i=n;i<dxArr.length;i++) adx=(adx*(n-1)+dxArr[i])/n;
  return adx;
}

function calcVolatility(closes, n) {
  if (closes.length < n+1) return null;
  var sl=closes.slice(-(n+1)), rets=[];
  for (var i=1;i<sl.length;i++) rets.push(Math.log(sl[i]/sl[i-1]));
  var mean=rets.reduce(function(a,b){return a+b;},0)/rets.length;
  var v=rets.reduce(function(a,b){return a+(b-mean)*(b-mean);},0)/rets.length;
  return Math.sqrt(v)*100;
}

// ── Strategy: 120-point scoring ────────────────────────
function applyStrategy(raw, symbol, sector, source) {
  var closes = raw.map(function(c){return c[4];});
  var highs   = raw.map(function(c){return c[2];});
  var lows    = raw.map(function(c){return c[3];});
  var vols    = raw.map(function(c){return c[5];});

  var close   = closes[closes.length-1];
  var prev    = closes[closes.length-2] || close;
  var s50     = sma(closes, 50);
  var s200    = sma(closes, 200);
  var rsiVal  = calcRSI(closes);
  var adxVal  = calcADX(highs, lows, closes, 14);
  var atrVal  = calcATR(highs, lows, closes, 14);
  var atrPrev = highs.length > 28 ? calcATR(highs.slice(0,-7), lows.slice(0,-7), closes.slice(0,-7), 14) : null;
  var high52  = Math.max.apply(null, highs.slice(-252));
  var low10   = Math.min.apply(null, lows.slice(-10));
  var vol      = vols[vols.length-1];
  // avgVol20: previous 20 days excluding today so comparison is fair
  var avgVol20 = sma(vols.slice(-21, -1), 20);
  var vol20   = calcVolatility(closes, 20);
  var vol50   = calcVolatility(closes, 50);

  // 6-month return (≈126 trading days)
  var n6 = Math.min(126, closes.length-1);
  var stock6M = n6 > 0 ? ((close - closes[closes.length-1-n6]) / closes[closes.length-1-n6]) * 100 : null;

  // Relative strength vs Nifty
  var rs = null;
  if (symbol !== 'NIFTY50' && S.results['NIFTY50'] && stock6M !== null && S.results['NIFTY50'].stock6M !== null) {
    rs = stock6M - S.results['NIFTY50'].stock6M;
  }

  // ── Score ──────────────────────────────────────────────
  var score = 0;

  // Trend (40 pts)
  var trendOk    = !!(s50 && s200 && s50 > s200);
  var price50Ok  = !!(s50 && close > s50);
  var price200Ok = !!(s200 && close > s200);
  if (trendOk)    score += 20;
  if (price50Ok)  score += 10;
  if (price200Ok) score += 10;

  // RSI sweet spot (10 pts)
  var rsiOk = !!(rsiVal && rsiVal >= 55 && rsiVal <= 75);
  if (rsiOk) score += 10;

  // ADX trend strength (15 pts)
  var adxOk = !!(adxVal && adxVal > 25);
  var adxPts = adxOk ? 15 : 0;
  score += adxPts;

  // Relative Strength (15 pts)
  var rsPts = 0;
  if (rs !== null && rs > 0)  rsPts += 10;
  if (rs !== null && rs > 15) rsPts += 5;
  score += rsPts;

  // Volume (15 pts)
  var volPts = 0;
  if (avgVol20 && vol > avgVol20 * 1.5) volPts += 10;
  if (avgVol20 && vol > avgVol20 * 2)   volPts += 5;
  score += volPts;

  // 52W High (15 pts)
  var h52Pts = 0;
  if (high52 && close >= high52 * 0.95) h52Pts += 10;
  if (high52 && close >= high52)        h52Pts += 5;
  score += h52Pts;

  // Volatility contraction (5 pts)
  var volContr = !!(atrPrev && atrVal && atrVal < atrPrev) || !!(vol20 && vol50 && vol20 < vol50);
  if (volContr) score += 5;

  // ── Penalties ───────────────────────────────────────────
  // RSI overbought (-10)
  var rsiPenalty = !!(rsiVal && rsiVal > 80);
  if (rsiPenalty) score -= 10;

  // Wide-range exhaustion candle (-10): last bar is bearish, body > 1.5× avg 20-bar body, price below SMA50
  var wrePenalty = false;
  if (raw.length >= 21) {
    var lastC = raw[raw.length-1];
    var lastBody = Math.abs(+lastC[4] - +lastC[1]);
    var avgBody20 = 0;
    for (var bi = raw.length-21; bi < raw.length-1; bi++) avgBody20 += Math.abs(+raw[bi][4] - +raw[bi][1]);
    avgBody20 /= 20;
    if (avgBody20 > 0 && lastBody > avgBody20 * 1.5 && +lastC[4] < +lastC[1] && s50 && close < s50) wrePenalty = true;
  }
  if (wrePenalty) score -= 10;

  // High delivery selling (-10): last 3 bars all bearish AND avg volume > 1.5× avgVol20
  var delivPenalty = false;
  if (raw.length >= 3 && avgVol20) {
    var last3 = raw.slice(-3);
    var allBear3 = last3.every(function(c){ return +c[4] < +c[1]; });
    var avgVol3  = (+last3[0][5] + +last3[1][5] + +last3[2][5]) / 3;
    if (allBear3 && avgVol3 > avgVol20 * 1.5) delivPenalty = true;
  }
  if (delivPenalty) score -= 10;

  // Recent earnings miss proxy (-20): gap-down >3% in last 60 bars, price still below pre-gap level
  var earnPenalty = false;
  if (raw.length >= 2) {
    var lb60 = raw.slice(-61);
    for (var ei = 1; ei < lb60.length; ei++) {
      var pc60 = +lb60[ei-1][4], go60 = +lb60[ei][1];
      if (pc60 > 0 && go60 < pc60 * 0.97 && close < pc60) { earnPenalty = true; break; }
    }
  }
  if (earnPenalty) score -= 20;

  score = Math.min(score, 120);

  // Momentum Quality Score (0–100)
  // If RS data is unavailable (NIFTY50 not yet scanned), redistribute RS weight
  // so missing data doesn't artificially zero-out MQS (BUG-08 fix)
  var mqs;
  if (rs !== null) {
    mqs = (0.40*(rsPts/15) + 0.30*(adxPts/15) + 0.20*(volPts/15) + 0.10*(h52Pts/15)) * 100;
  } else {
    mqs = (0.50*(adxPts/15) + 0.33*(volPts/15) + 0.17*(h52Pts/15)) * 100;
  }

  // Classification
  var cls = score >= 90 ? 'elite' : score >= 80 ? 'strong' : score >= 70 ? 'emerging' : 'weak';

  // Signal (respects market regime)
  var signal = cls === 'elite' || cls === 'strong' ? 'buy' : cls === 'emerging' ? 'watch' : 'sell';
  if (signal === 'buy' && symbol !== 'NIFTY50') {
    var regime = marketRegime();
    if (!regime.bullish) signal = 'watch';
  }

  // Stop loss: tighter of 10-day low or entry − 2×ATR
  var sl1 = low10;
  var sl2 = atrVal ? close - 2 * atrVal : null;
  var stopLoss = sl2 ? Math.max(sl1, sl2).toFixed(2) : sl1.toFixed(2);

  var volMultiple = avgVol20 ? (vol/avgVol20).toFixed(1) : null;
  var hi52pct     = high52 ? ((close/high52)*100).toFixed(1) : null;

  return {
    symbol, sector, source, close,
    chg: prev ? ((close-prev)/prev*100) : 0,
    sma50:s50, sma200:s200, rsiVal, adxVal, atrVal,
    high52, low10, vol, avgVol20, volMultiple,
    stock6M, rs, hi52pct, vol20, vol50,
    trendOk, price50Ok, price200Ok, rsiOk, adxOk, volContr,
    adxPts, rsPts, volPts, h52Pts,
    score, mqs: mqs.toFixed(1), classification: cls, signal, stopLoss,
    rsiPenalty, wrePenalty, delivPenalty, earnPenalty,
    passCount: score, totalActive: 120
  };
}

// ── Market regime ──────────────────────────────────────
function marketRegime() {
  var n = S.results['NIFTY50'];
  if (!n) return { bullish: true, reason: 'Pending Nifty data' };
  var bullish = (n.close > (n.sma200 || 0)) || (n.sma50 && n.sma200 && n.sma50 > n.sma200);
  return {
    bullish: bullish,
    niftyClose:  n.close,
    nifty50dma:  n.sma50,
    nifty200dma: n.sma200,
    reason: bullish
      ? (n.sma50 && n.sma200 && n.sma50 > n.sma200 ? 'Nifty 50DMA > 200DMA' : 'Nifty above 200 DMA')
      : 'Nifty below both moving averages'
  };
}

// ── Date range ─────────────────────────────────────────
function getDateRange() {
  // Use IST date (UTC+5:30) so the range is always correct for Indian users
  var now  = new Date(Date.now() + 5.5 * 60 * 60 * 1000);
  var to   = now.toISOString().split('T')[0];
  var from = new Date(now - 400 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
  return { from: from, to: to };
}

// ── Batch scan via /api/scan ───────────────────────────
function batchScan(syms, sectorMap, force) {
  var allSyms = syms.slice();
  if (allSyms.indexOf('NIFTY50') === -1) allSyms.unshift('NIFTY50');
  var range = getDateRange();
  var url = '/api/scan?symbols='+encodeURIComponent(allSyms.join(','))
    +'&from='+range.from+'&to='+range.to+(force?'&force=1':'');
  return fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data.ok) throw new Error(data.error || 'scan error');
      // Process NIFTY50 first so RS calculations work
      var n50 = data.results['NIFTY50'];
      if (n50 && n50.candles && n50.candles.length) {
        var r50 = applyStrategy(n50.candles, 'NIFTY50', 'INDEX', n50.source);
        r50._candles = n50.candles;
        S.results['NIFTY50'] = r50;
      }
      // Process stocks
      Object.keys(data.results).forEach(function(sym){
        if (sym === 'NIFTY50') return;
        var r = data.results[sym];
        var sec = sectorMap[sym] || S.activeSector;
        if (r && r.candles && r.candles.length) {
          var res = applyStrategy(r.candles, sym, sec, r.source);
          res._candles = r.candles; // kept for chart rendering
          S.results[sym] = res;
        }
      });
    });
}

function fetchCandlesWithFallback(sym, sector, force) {
  var range = getDateRange();
  var url = '/api/candles?symbol='+encodeURIComponent(sym)+'&from='+range.from+'&to='+range.to+(force?'&force=1':'');
  return fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.ok) return { candles: data.candles, source: data.source };
      throw new Error(data.error || 'candles error');
    })
    .catch(function(err){
      if (!S.sources.kite.connected) return Promise.reject(new Error('All sources failed for '+sym));
      return getInstrumentTokens([sym]).catch(function(){})
        .then(function(){ return kiteHistory(sym); })
        .then(function(candles){ return { candles:candles, source:'kite' }; });
    });
}

function liveScanSector(sec, force) {
  var syms = userSyms[sec];
  var sectorMap = {};
  syms.forEach(function(s){ sectorMap[s] = sec; });
  return batchScan(syms, sectorMap, force);
}

function autoScanSector(sec) {
  var syms = userSyms[sec];
  var scanned = syms.filter(function(s){ return !!S.results[s]; });
  if (!scanned.length && !S.scanning) triggerScan(sec, false);
}

function triggerScan(sec, force) {
  S.scanning=true; render();
  liveScanSector(sec, force)
    .catch(function(e){ showToast('Scan error: '+e.message); })
    .then(function(){ S.scanning=false; render(); });
}

function scanAll(force) {
  S.scanning=true; render();
  var sectorMap = {};
  Object.keys(SECTORS).forEach(function(sec){
    if (sec==='ALL') return;
    userSyms[sec].forEach(function(sym){ sectorMap[sym]=sec; });
  });
  batchScan(Object.keys(sectorMap), sectorMap, force)
    .catch(function(e){ showToast('Scan error: '+e.message); })
    .then(function(){ S.scanning=false; render(); });
}

// ── Render: Scanner ────────────────────────────────────
function renderScanner(){
  if(S.authLoading) return renderSplash();

  var sec    = S.activeSector;
  var syms   = userSyms[sec];
  var regime = marketRegime();

  // All scanned results for this sector
  var scanned = syms.filter(function(s){ return !!S.results[s]; });

  // Apply filters
  var clsSel = S.filter.cls;
  var filtered = scanned.filter(function(sym){
    var r = S.results[sym];
    if (!clsSel[r.classification]) return false;
    return true;
  });

  // Sort: score desc → RS desc → vol multiple desc → distance from high asc
  filtered.sort(function(a,b){
    var ra=S.results[a], rb=S.results[b];
    if (rb.score!==ra.score) return rb.score-ra.score;
    var rsA=ra.rs||0, rsB=rb.rs||0;
    if (rsB!==rsA) return rsB-rsA;
    var vmA=+(ra.volMultiple)||0, vmB=+(rb.volMultiple)||0;
    if (vmB!==vmA) return vmB-vmA;
    return (+(ra.hi52pct)||0)-(+(rb.hi52pct)||0);
  });

  var eliteArr   = filtered.filter(function(s){ return S.results[s].classification==='elite'; });
  var strongArr  = filtered.filter(function(s){ return S.results[s].classification==='strong'; });
  var emergArr   = filtered.filter(function(s){ return S.results[s].classification==='emerging'; });
  var weakArr    = filtered.filter(function(s){ return S.results[s].classification==='weak'; });

  // Regime banner
  var regimeBanner = '<div class="regime-bar" style="background:'+(regime.bullish?'rgba(74,222,128,.06)':'var(--amber-dim)')+';">'
    +'<div class="regime-dot" style="background:'+(regime.bullish?'var(--green)':'var(--amber)')+'"></div>'
    +'<span class="regime-txt" style="color:'+(regime.bullish?'var(--green)':'var(--amber)')+';">'
    +(regime.bullish?'Bullish Market':'Bearish — Buys Suppressed')+'</span>'
    +(regime.niftyClose?'<span class="regime-nifty">Nifty ₹'+fmt(regime.niftyClose)+'</span>':'')
    +'</div>';

  var strip = Object.keys(SECTORS).map(function(k){
    return '<div class="sec-tab '+(k===sec?'active':'')+'" onclick="S.activeSector=\''+k+'\';render();autoScanSector(\''+k+'\')">'+SECTORS[k].icon+' '+SECTORS[k].label+'</div>';
  }).join('');

  var scanBtn = S.scanning
    ? '<button class="scan-btn" disabled><div class="spinner sm"></div> Loading…</button>'
    : (sec==='ALL'
      ? '<button class="scan-btn" onclick="scanAll(true)">↺ Refresh All</button>'
      : '<button class="scan-btn" onclick="triggerScan(\''+sec+'\',true)">↺ Refresh</button>');

  var scanBar = '<div class="scan-bar"><div class="scan-info">'
    +(scanned.length
      ? '<b>'+filtered.length+'</b> shown · <b>'+scanned.length+'</b>/'+syms.length+' loaded'
      : '<b>'+syms.length+'</b> ready')

    ? '<div class="counts-bar">'

      +'<div class="count-cell"><div class="count-num" style="color:var(--amber)">'+strongArr.length+'</div><div class="count-lbl">Strong</div></div>'
      +'<div class="count-cell"><div class="count-num" style="color:var(--blue)">'+emergArr.length+'</div><div class="count-lbl">Emrg</div></div>'
      +'<div class="count-cell"><div class="count-num" style="color:var(--txt3)">'+weakArr.length+'</div><div class="count-lbl">Weak</div></div>'
      +'</div>' : '';

  var anyUnchecked = Object.keys(clsSel).some(function(k){ return !clsSel[k]; });
  var filterNote = anyUnchecked ? ' · <span style="color:var(--accent)">Filtered</span>' : '';
  var listHdr = '<div class="list-header"><div class="list-label">'+syms.length+' symbols'+filterNote+'</div>'
    +'<div class="manage-link" onclick="S.modal=true;render()">+ Manage</div></div>';

  var results = '';

        +'<div class="sig-grid">'

// ── Backtest engine ────────────────────────────────────
// Simplified scoring that runs purely on a candle slice (no regime/RS deps)
function btScore(slice) {
  if (slice.length < 60) return 0;
  var closes = slice.map(function(c){return +c[4]||0;});
  var highs  = slice.map(function(c){return +c[2]||0;});
  var lows   = slice.map(function(c){return +c[3]||0;});
  var vols   = slice.map(function(c){return +c[5]||0;});
  var n = closes.length, close = closes[n-1];
  function sm(arr,p){if(arr.length<p)return null;var s=0;for(var i=arr.length-p;i<arr.length;i++)s+=arr[i];return s/p;}
  var s50=sm(closes,50), s200=sm(closes,200);
  // Trend (40 pts)
  var tr=0;
  if(s50 && close>s50)tr+=20; if(s200&&close>s200)tr+=15; if(s50&&s200&&s50>s200)tr+=5;
  // RSI (10 pts)
  var rsi=calcRSI(closes), rp=0;
  if(rsi>=40&&rsi<=70)rp=10; else if(rsi>70&&rsi<=80)rp=5;
  // ADX (15 pts)
  var adx=calcADX(highs,lows,closes,14);
  var ap=adx>=30?15:adx>=20?10:adx>=15?5:0;
  // Volume (15 pts)
  var av=sm(vols.slice(-21,-1),20), vp=5;
  if(av&&vols[n-1]>av*1.5)vp=15; else if(av&&vols[n-1]>av*1.2)vp=10;
  // 52W high proximity (15 pts)
  var h52=Math.max.apply(null,closes.slice(Math.max(0,n-252)));
  var hp=close/h52*100; var h52p=hp>=95?15:hp>=85?10:hp>=75?5:0;
  // Volatility contraction (5 pts)
  var vc=calcVolatility(closes,20)<calcVolatility(closes,50)*0.85?5:0;
  return tr+rp+ap+vp+h52p+vc; // max 100
}

function btSL(slice) {
  var closes=slice.map(function(c){return +c[4]||0;});
  var highs =slice.map(function(c){return +c[2]||0;});
  var lows  =slice.map(function(c){return +c[3]||0;});
  var n=closes.length, close=closes[n-1];
  var low10=Math.min.apply(null,lows.slice(-10));
  var atr=calcATR(highs,lows,closes,14);
  return atr?Math.max(low10,close-2*atr):low10;
}

function runBacktest(symbol) {
  var raw=(S.results[symbol]||{})._candles;
  if(!raw||raw.length<220) return null;
  var WARMUP=200, ENTRY=80, EXIT=65;
  var trades=[], eq=[{d:raw[WARMUP][0],v:100}];
  var cur=100, inPos=false, pos=null;
  var bhStart=+raw[WARMUP][4];

  for(var i=WARMUP;i<raw.length-1;i++){
    var sl=btSlice(raw,i);
    var sc=btScore(sl), sl_=btSL(sl);
    var closeI=+raw[i][4], nextO=+raw[i+1][1];
    if(!inPos){
      if(sc>=ENTRY){inPos=true;pos={d:raw[i+1][0],p:nextO,sl:sl_,i:i+1,sc:sc};}
    } else {
      if(sl_>pos.sl)pos.sl=sl_;
      var stopHit=closeI<=pos.sl, sigExit=sc<EXIT;
      if(stopHit||sigExit){
        var xp=stopHit?Math.min(nextO,pos.sl):nextO;
        var ret=(xp-pos.p)/pos.p*100;
        cur*=(1+ret/100);
        trades.push({ed:pos.d,ep:pos.p,xd:raw[i+1][0],xp:xp,ret:ret,days:i+1-pos.i,why:stopHit?'Stop':'Score',win:ret>0});
        eq.push({d:raw[i+1][0],v:cur});
        inPos=false;pos=null;
      }
    }
  }
  if(inPos){
    var last=raw[raw.length-1], lc=+last[4];
    var ret=(lc-pos.p)/pos.p*100; cur*=(1+ret/100);
    trades.push({ed:pos.d,ep:pos.p,xd:last[0],xp:lc,ret:ret,days:raw.length-1-pos.i,why:'Open',win:ret>0});
    eq.push({d:last[0],v:cur});
  }
  if(eq.length<2)eq.push({d:raw[raw.length-1][0],v:100});

  var closed=trades.filter(function(t){return t.why!=='Open';});
  var wins=closed.filter(function(t){return t.win;});
  var loss=closed.filter(function(t){return !t.win;});
  var avgW=wins.length?wins.reduce(function(a,t){return a+t.ret;},0)/wins.length:0;
  var avgL=loss.length?loss.reduce(function(a,t){return a+t.ret;},0)/loss.length:0;
  var peak=100,mdd=0;
  eq.forEach(function(e){if(e.v>peak)peak=e.v;var dd=(peak-e.v)/peak*100;if(dd>mdd)mdd=dd;});
  var bhRet=(+raw[raw.length-1][4]-bhStart)/bhStart*100;
  return {trades,eq,totalRet:cur-100,bhRet,wr:closed.length?wins.length/closed.length*100:0,avgW,avgL,mdd,n:trades.length,symbol,from:raw[WARMUP][0],to:raw[raw.length-1][0]};
}

function btSlice(raw,i){return raw.slice(0,i+1);}

// ── Logic: fetch + score any symbol ───────────────────
function startAnalyze(sym) {
  var s = (sym || S.analyze.query || '').trim().toUpperCase();
  if (!s) { showToast('Enter a symbol'); return; }

  // Instant result if already scanned
  if (S.results[s] && S.results[s]._candles) {
    S.analyze.query  = s;
    S.analyze.result = S.results[s];
    S.analyze.error  = null;
    S.analyze.loading= false;
    render(); return;
  }

  S.analyze.query   = s;
  S.analyze.loading = true;
  S.analyze.error   = null;
  S.analyze.result  = null;
  render();

  var range = getDateRange();
  // Always include NIFTY50 so relative-strength can be computed
  var url = '/api/scan?symbols='+encodeURIComponent('NIFTY50,'+s)
    +'&from='+range.from+'&to='+range.to;

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (!data.ok) throw new Error(data.error||'Scan failed');
      // Seed NIFTY50 if we got it
      var n50 = data.results['NIFTY50'];
      if (n50 && n50.candles && n50.candles.length) {
        var r50 = applyStrategy(n50.candles,'NIFTY50','INDEX',n50.source);
        r50._candles = n50.candles;
        S.results['NIFTY50'] = r50;
      }
      var sr = data.results[s];
      if (!sr || sr.error) throw new Error((sr&&sr.error)||'Symbol not found: '+s);
      if (!sr.candles||!sr.candles.length) throw new Error('No price data returned for '+s);
      var res = applyStrategy(sr.candles, s, 'Custom', sr.source);
      res._candles = sr.candles;
      S.results[s] = res;
      S.analyze.result  = res;
      S.analyze.loading = false;
    })
    .catch(function(e){
      S.analyze.loading = false;
      S.analyze.error   = e.message;
    })
    .then(function(){ render(); });
}

// ── Day Trading ────────────────────────────────────────

function istNow() {
  return new Date(Date.now() + 5.5 * 60 * 60 * 1000);
}

function isMarketOpen() {
  var t = istNow();
  var dow = t.getUTCDay(); // 0=Sun 6=Sat (in IST, since we added 5.5h)
  if (dow === 0 || dow === 6) return false;
  var mins = t.getUTCHours() * 60 + t.getUTCMinutes();
  return mins >= 555 && mins <= 930; // 9:15–15:30 IST
}

function gapPct(q) {
  if (!q || !q.open || !q.pdc) return 0;
  return (q.open - q.pdc) / q.pdc * 100;
}

function daySetup(q, pdh, pdl) {
  var ltp = q.ltp || q.open || 0;
  var pdc = q.pdc || 0;
  var gap = gapPct(q);

  if (gap > 2.5) {
    var stop = Math.max(q.open || pdc, pdc || 0);
    var risk = ltp - stop;
    return { type:'Gap Up Play', note:'Opening above yesterday\'s range. Buy on dips, trail above open.',
      entry: ltp, stop: stop || null, target: risk > 0 ? ltp + 2*risk : null };
  }
  if (gap > 0.8) {
    return { type:'Gap Up', note: pdh ? 'PDH ₹'+Math.round(pdh)+' now acts as support.' : 'Watch open-level as support.',
      entry: pdh ? pdh + 0.5 : ltp, stop: pdc || null,
      target: pdh && pdc ? pdh + (pdh - pdc) : null };
  }
  if (gap < -2.5) {
    var stop2 = Math.min(q.open || pdc, pdc || 9999);
    var risk2 = stop2 - ltp;
    return { type:'Gap Down Play', note:'Opening below yesterday\'s range. Short on bounces, trail below open.',
      entry: ltp, stop: stop2 || null, target: risk2 > 0 ? ltp - 2*risk2 : null };
  }
  if (gap < -0.8) {
    return { type:'Gap Down', note: pdl ? 'PDL ₹'+Math.round(pdl)+' now acts as resistance.' : 'Watch open-level as resistance.',
      entry: ltp, stop: pdc || null,
      target: pdl && pdc ? pdl - (pdc - pdl) : null };
  }
  // Flat open — range play
  return { type:'Inside Open', note: (pdh && pdl) ? 'Trade the breakout: above PDH ₹'+Math.round(pdh)+' or below PDL ₹'+Math.round(pdl)+'.' : 'Wait for directional move.',
    entry: pdh || ltp, stop: pdl || null,
    target: pdh && pdl ? pdh + (pdh - pdl) : null };
}

  var ltpCol = (q.change >= 0) ? '#4ade80' : '#f87171';

  // PDH / PDL from second-to-last candle in historical data
  var candles = hist && hist._candles;
  var pdh = candles && candles.length >= 2 ? +candles[candles.length-2][2] : null;
  var pdl = candles && candles.length >= 2 ? +candles[candles.length-2][3] : null;

    +'</div>'
    // Key levels
    +'<div class="dtc-levels">'
      +'<div class="dtc-lv"><div class="dtc-lv-lbl">PDH</div><div class="dtc-lv-val">'+(pdh?'₹'+Math.round(pdh):'—')+'</div></div>'
      +'<div class="dtc-lv"><div class="dtc-lv-lbl">PDC</div><div class="dtc-lv-val">'+(pdc?'₹'+Math.round(pdc):'—')+'</div></div>'
      +'<div class="dtc-lv"><div class="dtc-lv-lbl">PDL</div><div class="dtc-lv-val">'+(pdl?'₹'+Math.round(pdl):'—')+'</div></div>'
    +'</div>'
    // Setup
    +'<div class="dtc-setup">'

    // Paper Trade buy button

    +'<div class="dt-pulse-grid">'
      +(nq ? '<div><div class="dt-pulse-lbl">Nifty 50</div>'
          +'<div class="dt-pulse-val" style="color:'+niftyCol+'">'+fmt(nq.ltp)+'</div>'
          +'<div style="font-size:11px;color:'+niftyCol+';font-family:DM Mono,monospace">'+(nq.change>=0?'+':'')+nq.change.toFixed(2)+'%</div>'
        +'</div>' : '')
      +'<div><div class="dt-pulse-lbl">Advances</div><div class="dt-pulse-val" style="color:#4ade80">'+adv+'</div></div>'
      +'<div><div class="dt-pulse-lbl">Declines</div><div class="dt-pulse-val" style="color:#f87171">'+dec+'</div></div>'
      +'<div><div class="dt-pulse-lbl">Refreshed</div><div style="font-size:11px;color:var(--txt3);margin-top:4px;font-family:DM Mono,monospace">'+(S.day.lastRefresh||'—')+'</div></div>'
    +'</div>'
  +'</div>';

  // Filter strip
  var filt = S.day.filter;
  var filterStrip = '<div class="dt-filter-strip">'
    +[['all','All'],['gapup','Gap Up'],['gapdn','Gap Down'],['vol','High Vol'],['momentum','Momentum']].map(function(f){
      var active = filt === f[0];
      return '<button onclick="S.day.filter=\''+f[0]+'\';render()" style="white-space:nowrap;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;flex-shrink:0;'
        +(active?'background:var(--accent);color:#0d1117;border:none':'background:var(--bg2);color:var(--txt3);border:0.5px solid var(--border)')+'">'+f[1]+'</button>';
    }).join('')
  +'</div>';

  // Collect & sort stocks
  var syms = Object.keys(quotes).filter(function(s){ return s !== 'NIFTY50'; });
  syms.sort(function(a,b){
    return Math.abs(gapPct(quotes[b]||{})) - Math.abs(gapPct(quotes[a]||{}));
  });

  // Apply filter
  syms = syms.filter(function(sym){
    var q = quotes[sym]; if (!q) return false;
    var g = gapPct(q);
    if (filt === 'gapup')    return g > 0.8;
    if (filt === 'gapdn')    return g < -0.8;
    if (filt === 'vol')      { var h=S.results[sym]; return h && h.avgVol20 && q.volume && q.volume/h.avgVol20 >= 1.5; }
    if (filt === 'momentum') { var h=S.results[sym]; return h && h.score >= 80; }
    return true;
  });

  var listHdr = '<div style="padding:4px 16px 8px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;font-family:DM Mono,monospace">'
    +(syms.length)+' setups · sorted by gap %</div>';

  var cards = syms.length
    ? '<div class="sig-grid">'+syms.map(function(sym){ return renderDtCard(sym, quotes[sym]); }).join('')+'</div>'
    : '<div class="empty">No stocks match this filter.</div>';

  return hdr + pulse + filterStrip + listHdr + cards + '<div style="height:28px"></div>';
}

async function fetchDayData() {
  S.day.loading = true;
  render();

  // Gather scanned symbols; fall back to a default NSE watchlist so
  // Load Quotes works even before the scanner has been run (BUG fix)
  var scannedSyms = Object.keys(S.results).filter(function(s){
    return s !== 'NIFTY50' && S.results[s] && S.results[s]._candles;
  });
  var DEFAULT_SYMS = [
    'RELIANCE','TCS','HDFCBANK','INFY','ICICIBANK','HINDUNILVR',
    'SBIN','BHARTIARTL','ITC','KOTAKBANK','LT','AXISBANK',
    'BAJFINANCE','MARUTI','WIPRO','ONGC','NTPC','SUNPHARMA',
    'TATAMOTORS','ADANIPORTS'
  ];
  var syms = ['NIFTY50'].concat(scannedSyms.length ? scannedSyms : DEFAULT_SYMS);

  var kiteToken = S.sources.kite.connected && S.sources.kite.token ? S.sources.kite.token : null;
  var url = '/api/quote?symbols=' + syms.join(',') + (kiteToken ? '&kiteToken=' + encodeURIComponent(kiteToken) : '');

  try {
    var res  = await fetch(url);
    if (!res.ok) {
      var errText = await res.text();
      throw new Error('HTTP ' + res.status + ': ' + errText.slice(0, 120));
    }
    var json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Quote API returned error');
    var count = Object.keys(json.quotes || {}).length;
    if (count === 0) throw new Error('No quote data returned — market may be closed');
    S.day.quotes      = json.quotes || {};
    S.day.lastRefresh = istNow().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' IST';
    showToast('Loaded ' + count + ' quotes');
    paperAutoCheck(); // update positions + auto-enter if enabled
  } catch(e) {
    showToast('Quote fetch failed: ' + e.message);
    console.error('fetchDayData error:', e);
  }

  S.day.loading = false;
  render();
}

// ── ORB signal computation ─────────────────────────────
function orbSignal(d, score) {
  if (!d || !d.orbH || !d.orbL || !d.ltp) return { type:'No Data', dir:'none', strength:0 };
  var orbSize = d.orbH - d.orbL;
  if (orbSize <= 0) return { type:'Invalid ORB', dir:'none', strength:0 };

  // A 10% buffer above/below ORB to avoid fake breakouts
  var buf    = orbSize * 0.10;
  var ltp    = d.ltp;
  var vol    = d.volRatio || 1;

  // Strength factors (0–4): volume × 2 + score + gap
  function calcStrength(dir) {
    var s = 0;
    if (vol >= 2.0) s += 2; else if (vol >= 1.3) s += 1;
    if (score >= 80) s += 1;
    if (dir === 'long'  && d.change > 0.5)  s += 1;
    if (dir === 'short' && d.change < -0.5) s += 1;
    return Math.min(s, 4);
  }

  if (ltp > d.orbH + buf) {
    var risk = d.orbH - d.orbL;
    return {
      type:'Long Breakout', dir:'long',
      entry:  d.orbH,
      stop:   d.orbL,
      target: d.orbH + risk * 1.5,
      rr:     '1.5R',
      strength: calcStrength('long')
    };
  }
  if (ltp < d.orbL - buf) {
    var risk2 = d.orbH - d.orbL;
    return {
      type:'Short Breakout', dir:'short',
      entry:  d.orbL,
      stop:   d.orbH,
      target: d.orbL - risk2 * 1.5,
      rr:     '1.5R',
      strength: calcStrength('short')
    };
  }
  // Price inside opening range
  var pctPos = orbSize > 0 ? ((ltp - d.orbL) / orbSize * 100).toFixed(0) : 50;
  return {
    type:'Inside Range', dir:'none',
    entry:  d.orbH,       // breakout entry
    stop:   d.orbL,       // breakdown stop
    target: null,
    rr:     'Wait',
    orbPct: pctPos,       // how far through the range 0–100%
    strength: 0
  };
}

    +'</div>';

  var cards = filtered.length
    ? '<div style="padding:12px">'
        + filtered.map(function(item){ return renderStrategyCard(item.sym, item.d); }).join('')
      +'</div>'
    : '<div class="empty">No signals match this filter.</div>';

  return header + summary + filterStrip + cards + '<div style="height:28px"></div>';
}

// ── Paper Trading ──────────────────────────────────────

function savePaper() {
  localStorage.setItem('paper_cash',      S.paper.cash);
  localStorage.setItem('paper_positions', JSON.stringify(S.paper.positions));
  localStorage.setItem('paper_trades',    JSON.stringify(S.paper.trades));
  localStorage.setItem('paper_auto',      S.paper.autoTrade ? '1' : '0');
}

function paperBuy(sym, entry, stop, target, setup) {
  entry = +entry; stop = +stop; target = +target;
  if (!entry || !stop || entry <= 0 || stop <= 0) { showToast('Invalid entry/stop for ' + sym); return; }
  if (S.paper.positions.find(function(p){ return p.sym === sym; })) {
    showToast(sym + ' already in portfolio'); return;
  }
  if (S.paper.positions.length >= S.paper.maxPos) {
    showToast('Max ' + S.paper.maxPos + ' positions reached'); return;
  }
  var risk = entry - stop;
  if (risk <= 0) { showToast('Stop must be below entry for ' + sym); return; }
  var capitalRisk = S.paper.capital * (S.paper.riskPct / 100); // 1% of ₹5L = ₹5000
  var qty = Math.max(1, Math.floor(capitalRisk / risk));
  var cost = entry * qty;
  if (cost > S.paper.cash) qty = Math.max(1, Math.floor(S.paper.cash * 0.9 / entry));
  cost = entry * qty;
  if (qty < 1 || cost > S.paper.cash) { showToast('Insufficient cash for ' + sym); return; }
  S.paper.cash -= cost;
  S.paper.positions.push({
    id: Date.now(), sym: sym,
    entry: entry, qty: qty, stop: stop, target: target || null,
    setup: setup || 'Manual',
    time: istNow().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' IST',
    ltp: entry
  });
  savePaper();
  showToast('📋 Bought ' + qty + ' × ' + sym + ' @ ₹' + Math.round(entry));
  if (S.tab === 'paper') render();
}

function paperClose(id, exitPrice, reason) {
  var idx = S.paper.positions.findIndex(function(p){ return p.id === id; });
  if (idx < 0) return;
  var p = S.paper.positions[idx];
  exitPrice = +exitPrice;
  var pnl = (exitPrice - p.entry) * p.qty;
  S.paper.cash += exitPrice * p.qty;
  S.paper.trades.unshift({
    id: p.id, sym: p.sym,
    entry: p.entry, exit: exitPrice, qty: p.qty,
    pnl: pnl, reason: reason,
    entryTime: p.time,
    exitTime: istNow().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' IST'
  });
  S.paper.positions.splice(idx, 1);
  savePaper();
  var icon = pnl >= 0 ? '✅' : '🔴';
  showToast(icon + ' Closed ' + p.sym + ' ' + (pnl>=0?'+':'') + '₹' + Math.round(Math.abs(pnl)) + ' (' + reason + ')');
  render();
}

function paperAutoCheck() {
  var quotes = S.day.quotes;

  // 1. Update LTPs + auto-exit open positions
  S.paper.positions.slice().forEach(function(pos) {
    var q = quotes[pos.sym];
    if (q && q.ltp) pos.ltp = q.ltp;
    if (!S.paper.autoTrade) return;
    if (pos.target && pos.ltp >= pos.target) {
      paperClose(pos.id, pos.target, 'Target Hit');
    } else if (pos.stop && pos.ltp <= pos.stop) {
      paperClose(pos.id, pos.stop, 'Stop Loss');
    }
  });

  // 2. Auto-enter — Gap Up Play >2.5% only
  if (!S.paper.autoTrade) return;
  Object.keys(quotes).forEach(function(sym) {
    if (sym === 'NIFTY50') return;
    if (S.paper.positions.length >= S.paper.maxPos) return;
    if (S.paper.positions.find(function(p){ return p.sym === sym; })) return;
    var q = quotes[sym];
    if (!q || !q.ltp) return;
    if (gapPct(q) <= 2.5) return; // Gap Up Play threshold
    var hist = S.results[sym];
    if (hist && hist.score < 60) return; // skip weak stocks
    var candles = hist && hist._candles;
    var pdh = candles && candles.length >= 2 ? +candles[candles.length-2][2] : null;
    var pdl = candles && candles.length >= 2 ? +candles[candles.length-2][3] : null;
    var setup = daySetup(q, pdh, pdl);
    if (setup.type === 'Gap Up Play' && setup.entry && setup.stop) {
      paperBuy(sym, setup.entry, setup.stop, setup.target, setup.type);
    }
  });
}

function renderPaperTrading() {
  var p = S.paper;
  var quotes = S.day.quotes;

  // Compute P&L
  var unrealPnl = 0;
  p.positions.forEach(function(pos) {
    var q = quotes[pos.sym];
    if (q && q.ltp) pos.ltp = q.ltp;
    unrealPnl += ((pos.ltp || pos.entry) - pos.entry) * pos.qty;
  });
  var realPnl = p.trades.reduce(function(s, t){ return s + t.pnl; }, 0);
  var totalPnl = unrealPnl + realPnl;
  var totalPnlPct = (totalPnl / p.capital * 100);
  var portfolioVal = p.cash + p.positions.reduce(function(s, pos){ return s + (pos.ltp || pos.entry) * pos.qty; }, 0);

  var g  = function(v){ return v >= 0 ? 'var(--green)' : 'var(--red)'; };
  var gf = function(v){ return (v >= 0 ? '+' : '') + fmt(Math.abs(v)); };

  // ── Header / portfolio summary
  var header =
    '<div style="padding:16px 16px 12px;background:var(--bg2);border-bottom:0.5px solid var(--border)">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">'
        +'<div>'
          +'<div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;font-family:DM Mono,monospace;margin-bottom:2px">Paper Portfolio</div>'
          +'<div style="font-size:24px;font-weight:700;color:var(--txt)">₹'+fmt(portfolioVal)+'</div>'
          +'<div style="font-size:13px;font-weight:600;color:'+g(totalPnl)+';margin-top:2px">'
            +(totalPnl>=0?'+':'')+'₹'+fmt(Math.abs(totalPnl))+' ('+totalPnlPct.toFixed(1)+'%)'
          +'</div>'
        +'</div>'
        +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">'
          +'<button onclick="S.paper.autoTrade=!S.paper.autoTrade;savePaper();render()" '
            +'style="padding:7px 14px;border-radius:20px;border:1px solid '+(p.autoTrade?'var(--green)':'var(--border)')+';'
              +'background:'+(p.autoTrade?'var(--green-dim)':'var(--bg3)')+';'
              +'color:'+(p.autoTrade?'var(--green)':'var(--txt3)')+';'
              +'font-size:12px;font-weight:700;cursor:pointer;font-family:\'DM Mono\',monospace">'
            +(p.autoTrade?'⚡ Auto ON':'○ Auto OFF')+'</button>'
          +(p.autoTrade
            ?'<div style="font-size:10px;color:var(--green);text-align:right;font-family:DM Mono,monospace">Gap Up Play >&nbsp;2.5%</div>'
            :'<div style="font-size:10px;color:var(--txt3);text-align:right;font-family:DM Mono,monospace">Refresh quotes<br>to trigger</div>')
        +'</div>'
      +'</div>'
      // Stats row
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">'
        +'<div style="background:var(--bg3);padding:10px;border-radius:var(--r)">'
          +'<div style="font-size:9px;color:var(--txt3);font-family:DM Mono,monospace;margin-bottom:3px">CASH</div>'
          +'<div style="font-size:13px;font-weight:700;color:var(--txt)">₹'+fmt(p.cash)+'</div>'
        +'</div>'
        +'<div style="background:var(--bg3);padding:10px;border-radius:var(--r)">'
          +'<div style="font-size:9px;color:var(--txt3);font-family:DM Mono,monospace;margin-bottom:3px">UNREALISED</div>'
          +'<div style="font-size:13px;font-weight:700;color:'+g(unrealPnl)+'">'+gf(unrealPnl)+'</div>'
        +'</div>'
        +'<div style="background:var(--bg3);padding:10px;border-radius:var(--r)">'
          +'<div style="font-size:9px;color:var(--txt3);font-family:DM Mono,monospace;margin-bottom:3px">REALISED</div>'
          +'<div style="font-size:13px;font-weight:700;color:'+g(realPnl)+'">'+gf(realPnl)+'</div>'
        +'</div>'
      +'</div>'
    +'</div>';

  // ── Open positions
  var posHtml;
  if (p.positions.length) {
    posHtml = '<div style="padding:14px 16px 6px">'
      +'<div style="font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;font-family:DM Mono,monospace">'
        +'Open Positions ('+p.positions.length+'/'+p.maxPos+')'
      +'</div></div>'
      +p.positions.map(function(pos) {
        var ltp = pos.ltp || pos.entry;
        var pnl = (ltp - pos.entry) * pos.qty;
        var pnlPct = ((ltp - pos.entry) / pos.entry) * 100;
        var col = g(pnl);
        return '<div style="margin:0 12px 10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden">'
          // Header row
          +'<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 12px 8px">'
            +'<div>'
              +'<div style="font-size:16px;font-weight:700;color:var(--txt)">'+escHtml(pos.sym)+'</div>'
              +'<div style="font-size:11px;color:var(--txt3);font-family:DM Mono,monospace">'+pos.setup+' · '+pos.qty+' qty · '+pos.time+'</div>'
            +'</div>'
            +'<div style="text-align:right">'
              +'<div style="font-size:17px;font-weight:700;color:'+col+'">'+(pnl>=0?'+':'')+'₹'+fmt(Math.abs(pnl))+'</div>'
              +'<div style="font-size:11px;color:'+col+'">'+(pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'%</div>'
            +'</div>'
          +'</div>'
          // Data grid
          +'<div style="display:grid;grid-template-columns:repeat(4,1fr);border-top:0.5px solid var(--border)">'
            +[
              {l:'Entry', v:'₹'+Math.round(pos.entry), c:'var(--txt2)'},
              {l:'LTP',   v:'₹'+fmt(ltp),              c:'var(--txt)'},
              {l:'Stop',  v:pos.stop   ? '₹'+Math.round(pos.stop)   : '—', c:'var(--red)'},
              {l:'Target',v:pos.target ? '₹'+Math.round(pos.target) : '—', c:'var(--green)'}
            ].map(function(cell, i){
              return '<div style="padding:8px 10px'+(i<3?';border-right:0.5px solid var(--border)':'')+'">'
                +'<div style="font-size:9px;color:var(--txt3);font-family:DM Mono,monospace;margin-bottom:2px">'+cell.l+'</div>'
                +'<div style="font-size:12px;font-weight:600;color:'+cell.c+'">'+cell.v+'</div>'
              +'</div>';
            }).join('')
          +'</div>'
          // Action buttons
          +'<div style="display:flex;gap:8px;padding:8px 10px;border-top:0.5px solid var(--border)">'
            +'<button onclick="paperClose('+pos.id+','+ltp+',\'Manual\')" '
              +'style="flex:1;padding:7px;border-radius:7px;border:0.5px solid var(--border);background:var(--bg3);color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer">Close @ ₹'+fmt(ltp)+'</button>'
            +(pos.stop
              ? '<button onclick="paperClose('+pos.id+','+pos.stop+',\'Stop Loss\')" '
                  +'style="flex:1;padding:7px;border-radius:7px;border:0.5px solid var(--red);background:rgba(248,113,113,.08);color:var(--red);font-size:12px;font-weight:600;cursor:pointer">Hit SL ₹'+Math.round(pos.stop)+'</button>'
              : '')
            +(pos.target
              ? '<button onclick="paperClose('+pos.id+','+pos.target+',\'Target Hit\')" '
                  +'style="flex:1;padding:7px;border-radius:7px;border:0.5px solid var(--green);background:var(--green-dim);color:var(--green);font-size:12px;font-weight:600;cursor:pointer">Hit TP ₹'+Math.round(pos.target)+'</button>'
              : '')
          +'</div>'
        +'</div>';
      }).join('');
  } else {
    posHtml = '<div style="padding:24px 20px;text-align:center">'
      +'<div style="font-size:32px;margin-bottom:10px">📋</div>'
      +'<div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:6px">No Open Positions</div>'
      +'<div style="font-size:12px;color:var(--txt3);line-height:1.6">Go to ⚡ Day Trading, load quotes,<br>then tap <b style="color:var(--accent)">Paper Buy</b> on any setup.<br>Or enable <b style="color:var(--green)">Auto ON</b> to buy Gap Up Plays automatically.</div>'
    +'</div>';
  }

  // ── Trade history
  var tradesHtml = '';
  if (p.trades.length) {
    var wr = p.trades.filter(function(t){ return t.pnl > 0; }).length;
    var wrPct = ((wr / p.trades.length) * 100).toFixed(0);
    tradesHtml =
      '<div style="padding:14px 16px 6px;border-top:0.5px solid var(--border)">'
        +'<div style="display:flex;align-items:center;justify-content:space-between">'
          +'<div style="font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;font-family:DM Mono,monospace">'
            +'Trade History ('+p.trades.length+')'
          +'</div>'
          +'<div style="font-size:11px;color:var(--txt3);font-family:DM Mono,monospace">'+wrPct+'% win rate</div>'
        +'</div>'
      +'</div>'
      +p.trades.map(function(t) {
        var col = g(t.pnl);
        var icon = t.pnl >= 0 ? '✅' : '🔴';
        return '<div style="display:flex;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--border)">'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-size:13px;font-weight:700;color:var(--txt)">'+icon+' '+escHtml(t.sym)+'</div>'
            +'<div style="font-size:11px;color:var(--txt3);font-family:DM Mono,monospace">₹'+Math.round(t.entry)+' → ₹'+Math.round(t.exit)+' · '+t.qty+' qty · '+t.reason+'</div>'
            +'<div style="font-size:10px;color:var(--txt3);font-family:DM Mono,monospace">'+t.entryTime+' → '+t.exitTime+'</div>'
          +'</div>'
          +'<div style="text-align:right;margin-left:10px">'
            +'<div style="font-size:15px;font-weight:700;color:'+col+'">'+(t.pnl>=0?'+':'')+'₹'+Math.round(Math.abs(t.pnl))+'</div>'
            +'<div style="font-size:10px;color:'+col+'">'+((t.exit-t.entry)/t.entry*100).toFixed(1)+'%</div>'
          +'</div>'
        +'</div>';
      }).join('');
  }

  // ── Footer actions
  var footer =
    '<div style="padding:12px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px">'
      +'<button onclick="switchTab(\'day\')" '
        +'style="flex:1;padding:10px;border-radius:var(--r);border:0.5px solid var(--accent);background:rgba(61,255,160,.07);color:var(--accent);font-size:13px;font-weight:700;cursor:pointer">⚡ Day Trading</button>'
      +'<button onclick="if(confirm(\'Reset all paper trades and portfolio? This cannot be undone.\')){'
        +'S.paper.cash=S.paper.capital;S.paper.positions=[];S.paper.trades=[];savePaper();render();}" '
        +'style="padding:10px 14px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg3);color:var(--txt3);font-size:12px;cursor:pointer">↺ Reset</button>'
    +'</div>';

  return header + posHtml + tradesHtml + footer + '<div style="height:28px"></div>';
}

// ── Main render ────────────────────────────────────────
function render(){
  var el=document.getElementById('content');
  if(S.tab==='setup'){       el.innerHTML=renderSetup();          }
  else if(S.tab==='filter'){    el.innerHTML=renderFilter();       }
  else if(S.tab==='analyze'){   el.innerHTML=renderAnalyze();      }
  else if(S.tab==='day'){       el.innerHTML=renderDayTrading();   }
  else if(S.tab==='paper'){     el.innerHTML=renderPaperTrading(); }
  else if(S.tab==='strategy'){  el.innerHTML=renderStrategy();     }
  else if(S.detail){            el.innerHTML=renderDetail();       }
  else { el.innerHTML=renderScanner(); }
  updateSbRegime();
  // Initialise LightweightCharts into any containers the current page rendered
  setTimeout(initCharts, 80);
}

// ── Boot ───────────────────────────────────────────────
render();
initKite();
