<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { background: #111; color: #eee; font-family: monospace; padding: 20px; }
.step { padding: 8px 12px; margin: 4px 0; border-radius: 4px; font-size: 14px; }
.ok  { background: #14532d; color: #4ade80; }
.err { background: #7f1d1d; color: #f87171; }
#chart { width:100%; height:250px; background:#1a1e1c; border:1px solid #333; margin-top:16px; }
</style>
</head>
<body>

<div id="s1" class="step">Step 1: HTML parsed ✓</div>
<div id="s2" class="step" style="background:#1f2937">Step 2: First script ran (waiting...)</div>
<div id="s3" class="step" style="background:#1f2937">Step 3: LWC library loaded (waiting...)</div>
<div id="s4" class="step" style="background:#1f2937">Step 4: createChart (waiting...)</div>
<div id="s5" class="step" style="background:#1f2937">Step 5: setData (waiting...)</div>
<div id="chart"></div>

<!-- Step 2: inline script before library -->
<script>
document.getElementById('s2').textContent = 'Step 2: Inline script ran ✓';
document.getElementById('s2').className = 'step ok';
</script>

<!-- Step 3: load LWC from local file -->
<script src="./lightweight-charts.js"></script>

<!-- Steps 4-5: use LWC -->
<script>
try {
  var v = window.LightweightCharts ? window.LightweightCharts.version() : 'NOT LOADED';
  document.getElementById('s3').textContent = 'Step 3: LWC = ' + v;
  document.getElementById('s3').className = 'step ' + (window.LightweightCharts ? 'ok' : 'err');

  if (!window.LightweightCharts) throw new Error('LWC not on window');

  var el = document.getElementById('chart');
  document.getElementById('s4').textContent = 'Step 4: el.clientWidth=' + el.clientWidth + ' el.offsetWidth=' + el.offsetWidth;

  var chart = window.LightweightCharts.createChart(el, {
    width: el.clientWidth || el.offsetWidth || 600,
    height: 250,
    layout: { background: { color: '#1a1e1c' }, textColor: '#9ca3af' }
  });
  document.getElementById('s4').className = 'step ok';
  document.getElementById('s4').textContent += '  → createChart OK';

  var cs = chart.addCandlestickSeries({ upColor:'#4ade80', downColor:'#f87171' });
  cs.setData([
    { time:'2024-01-02', open:100, high:110, low:95,  close:107 },
    { time:'2024-01-03', open:107, high:115, low:103, close:112 },
    { time:'2024-01-04', open:112, high:118, low:108, close:110 },
    { time:'2024-01-05', open:110, high:113, low:100, close:102 },
    { time:'2024-01-08', open:102, high:109, low: 98, close:106 },
  ]);
  chart.timeScale().fitContent();

  document.getElementById('s5').textContent = 'Step 5: setData + fitContent OK ✓ — chart should be visible above';
  document.getElementById('s5').className = 'step ok';
} catch(e) {
  var failed = document.querySelector('.step:not(.ok)');
  if (failed) { failed.textContent += ' — ERROR: ' + e.message; failed.className = 'step err'; }
  console.error(e);
}
</script>
</body>
</html>
